<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnA지원포탈</title>
</head>
<body>
<h1>이름, 학번, 전화번호, 지원동기 & 이루고 싶은 목표 등을 써주세요</h1>
<form action="/submit" method="post" enctype="multipart/form-data">
  <label>이름: <input name="name" required></label><br>
  <label>학번: <input name="number" required></label><br>
  <label>전화번호: <input name="phone_number" required></label><br>
  <label>지원동기: <input name="donge" required></label><br>
  <label>파일: <input type="file" name="file" required></label><br>
  <button type="submit">보내기</button><!--action method부분 제가 다 작성했고 enctype은 제가 작성 안 하고 일부 에이아이 도움 받았고 나머지 스파게티 코드 정리 좀 맡겼습니다 -->
</form>
</body>
</html>
